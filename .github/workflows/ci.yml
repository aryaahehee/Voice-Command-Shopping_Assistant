name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend tests ───────────────────────────────────────────
  backend:
    name: Backend — type-check & test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Run tests
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/voicecart_test
          JWT_SECRET: test_secret_at_least_32_characters_long!
          JWT_REFRESH_SECRET: test_refresh_secret_32_chars_long!!
          OPENAI_API_KEY: ""
        run: npm test -- --coverage --passWithNoTests

  # ── Frontend tests ──────────────────────────────────────────
  frontend:
    name: Frontend — type-check & test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Run tests
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api
        run: npm test -- --coverage --passWithNoTests

  # ── Lint ──────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Lint frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint

      - name: Lint backend
        working-directory: backend
        run: |
          npm ci
          npm run lint
